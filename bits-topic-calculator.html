<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BITS Topic Number Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4F46E5,#06B6D4,#14B8A6);
    background-size:300% 300%;
    animation:gradient 12s ease infinite;
    padding:20px;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    width:100%;
    max-width:700px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:35px;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
    border:1px solid rgba(255,255,255,.2);
    color:#fff;
}

h1{
    text-align:center;
    font-size:32px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    opacity:.9;
    margin-bottom:30px;
}

.info{
    background:rgba(255,255,255,.12);
    padding:20px;
    border-radius:15px;
    margin-bottom:25px;
}

.info h3{
    margin-bottom:10px;
}

.formula{
    margin-top:15px;
    background:rgba(255,255,255,.18);
    padding:12px;
    border-radius:10px;
    text-align:center;
    font-weight:600;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

input{
    width:100%;
    padding:15px;
    font-size:18px;
    border:2px solid transparent;
    outline:none;
    border-radius:12px;
    text-transform:uppercase;
}

input:focus{
    box-shadow:0 0 0 3px rgba(255,255,255,.35);
}

input.valid{
    border-color:#22C55E;
}

input.invalid{
    border-color:#DC2626;
}

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    font-size:18px;
    font-weight:600;
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:white;
    background:linear-gradient(45deg,#2563EB,#06B6D4);
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.message{
    margin-top:18px;
    display:none;
    padding:15px;
    border-radius:12px;
    font-weight:500;
}

.error{
    background:#FEE2E2;
    color:#991B1B;
    border-left:5px solid #DC2626;
}

.success{
    background:#DCFCE7;
    color:#166534;
    border-left:5px solid #22C55E;
}

.result{
    margin-top:25px;
    display:none;
}

.topic-card{
    background:white;
    color:#333;
    border-radius:15px;
    padding:25px;
}

.topic-number{
    text-align:center;
    font-size:60px;
    color:#2563EB;
    font-weight:700;
}

.topic-title{
    text-align:center;
    font-size:24px;
    margin-bottom:20px;
}

.steps{
    line-height:2;
}

.case-study{
    background:#EEF6FF;
    padding:20px;
    border-radius:12px;
    border-left:6px solid #2563EB;
}

.case-study h2{
    margin-bottom:12px;
    color:#2563EB;
}

.case-study h3{
    margin-bottom:15px;
    color:#0F172A;
    font-size:30px;
}

.case-study p{
    font-size:17px;
    line-height:1.8;
    color:#334155;
}

.footer{
    text-align:center;
    margin-top:25px;
    opacity:.85;
    font-size:14px;
}

small{
    display:block;
    margin-top:8px;
    opacity:.9;
}

@media(max-width:650px){
    .container{padding:25px;}
    h1{font-size:26px;}
    .topic-number{font-size:48px;}
}
</style>
</head>
<body>
<div class="container">
    <h1>BITS Topic Calculator</h1>

    <p class="subtitle">
        Find your assigned topic instantly using your complete BITS ID.
    </p>

    <div class="info">
        <h3>Instructions</h3>
        <p>Enter your complete BITS ID.</p>
        <div class="formula">
            Topic Number = (Last Two Digits of BITS ID % 16) + 1
        </div>
    </div>

    <label for="bitsId">Complete BITS ID</label>
    <input
        type="text"
        id="bitsId"
        maxlength="11"
        placeholder="Example: 2023WD86541"
        autocomplete="off"
        aria-describedby="formatHint message">

    <small id="formatHint">
        Format: <strong>YYYYLLNNNNN</strong><br>
        Example: <strong>2023WD86541</strong>
    </small>

    <button id="calculateBtn" type="button">
        Calculate Topic
    </button>

    <div id="message" class="message" aria-live="polite"></div>

    <div class="result" id="result">
        <div class="topic-card">
            <div class="topic-number" id="topicNumber"></div>
            <div class="topic-title">Assigned Topic</div>
            <div class="steps" id="steps"></div>
        </div>
    </div>

    <div class="footer">
        Made with &hearts; by Sonu Saw
    </div>
</div>

<script>
const topics = [
    "A fast-growing ed-tech company serving 1 million learners must decide whether to build its own data center or rely on cloud providers while ensuring scalability, reliability, and cost efficiency.",
    "A regional bank planning digital transformation must design a data center architecture that balances business value, regulatory compliance, high availability, and infrastructure costs.",
    "An e-commerce platform expects a 20x increase in traffic during annual sales events and needs a scalable infrastructure, appropriate server deployment strategy, and proactive monitoring solution.",
    "A healthcare provider launching telemedicine services must identify the required compute, storage, networking, and security components while ensuring continuous service availability.",
    "A startup has a limited budget to establish its first data center and must prioritize physical infrastructure, server platforms, and monitoring capabilities to maximize business value.",
    "A manufacturing company operates hundreds of underutilized servers and seeks to consolidate workloads through virtualization while maintaining performance and reducing operating costs.",
    "A university planning a smart campus must choose between traditional, converged, and hyperconverged infrastructure while considering future scalability and operational simplicity.",
    "A government department recovering from a ransomware attack must redesign its server hardening, infrastructure architecture, monitoring processes, and maintenance practices.",
    "A retail enterprise with 500 branch offices must determine whether centralized infrastructure, converged infrastructure, or hyperconverged infrastructure offers the best balance of performance and manageability.",
    "A financial institution experiencing frequent service outages must investigate whether the root cause lies in infrastructure design, server capacity planning, monitoring deficiencies, or maintenance practices.",
    "A SaaS provider hosting business applications for global customers must design a highly available platform incorporating scalable servers, optimized infrastructure, and real-time monitoring.",
    "An organization planning AI and analytics workloads must evaluate how server selection, storage architecture, infrastructure type, and operational monitoring influence performance and costs.",
    "A telecom operator experiencing rapid data growth must redesign its data center to improve scalability, server utilization, maintenance efficiency, and infrastructure management.",
    "A multinational company wants to standardize its data center operations worldwide and must identify the optimal combination of infrastructure architecture, server technologies, and monitoring frameworks.",
    "A company undergoing digital transformation wants to transform its traditional data center into a software-defined and highly automated environment while minimizing business disruption.",
    "As a consultant, recommend a complete data center strategy for an organization of your choice, covering business requirements, scalability, infrastructure components, server architecture, monitoring, maintenance, and cost optimization."
];

const input = document.getElementById("bitsId");
const button = document.getElementById("calculateBtn");
const message = document.getElementById("message");
const result = document.getElementById("result");
const topicNumber = document.getElementById("topicNumber");
const steps = document.getElementById("steps");

function setMessage(type, html) {
    message.className = `message ${type}`;
    message.style.display = "block";
    message.innerHTML = html;
}

function clearMessage() {
    message.style.display = "none";
    message.innerHTML = "";
}

function hideResult() {
    result.style.display = "none";
    topicNumber.textContent = "";
    steps.innerHTML = "";
}

function getValidation(bitsId) {
    if (bitsId === "") {
        return {
            valid: false,
            message: "Please enter your complete BITS ID."
        };
    }

    const errors = [];

    if (bitsId.length < 11) {
        errors.push(`BITS ID needs ${11 - bitsId.length} more character(s).`);
    } else if (bitsId.length > 11) {
        errors.push("BITS ID must contain exactly 11 characters.");
    }

    if (!/^\d{0,4}$/.test(bitsId.slice(0, Math.min(4, bitsId.length)))) {
        errors.push("First 4 characters must be digits.");
    }

    if (bitsId.length >= 5 && !/^[A-Z]{0,2}$/.test(bitsId.slice(4, Math.min(6, bitsId.length)))) {
        errors.push("Characters 5 and 6 must be letters.");
    }

    if (bitsId.length >= 7 && !/^\d{0,5}$/.test(bitsId.slice(6))) {
        errors.push("Last 5 characters must be digits.");
    }

    if (errors.length > 0) {
        return {
            valid: false,
            message: `<b>Invalid BITS ID</b><br>${errors.join("<br>")}<br><br><b>Correct Format:</b> YYYYLLNNNNN<br>Example: <b>2023WD86541</b>`
        };
    }

    if (!/^\d{4}[A-Z]{2}\d{5}$/.test(bitsId)) {
        return {
            valid: false,
            message: "<b>Invalid BITS ID</b><br><br><b>Correct Format:</b> YYYYLLNNNNN<br>Example: <b>2023WD86541</b>"
        };
    }

    return { valid: true };
}

function renderTopic(bitsId) {
    const lastTwo = Number(bitsId.slice(-2));
    const remainder = lastTwo % 16;
    const topic = remainder + 1;

    setMessage("success", "Valid BITS ID detected.");
    result.style.display = "block";
    topicNumber.textContent = `Topic ${topic}`;
    steps.innerHTML = `
        <b>Entered BITS ID:</b> ${bitsId}<br><br>
        <b>Last Two Digits:</b> ${lastTwo}<br>
        <b>Calculation:</b><br>
        ${lastTwo} % 16 = <b>${remainder}</b><br>
        ${remainder} + 1 = <b>${topic}</b>
        <hr style="margin:20px 0;">
        <div class="case-study">
            <h2>Assigned Case Study</h2>
            <h3>Topic ${topic}</h3>
            <p>${topics[topic - 1]}</p>
        </div>
    `;
}

function validateAndUpdate() {
    const bitsId = input.value.trim().toUpperCase();
    input.value = bitsId;

    const validation = getValidation(bitsId);
    input.classList.toggle("valid", validation.valid);
    input.classList.toggle("invalid", bitsId !== "" && !validation.valid);

    if (bitsId === "") {
        clearMessage();
        hideResult();
        return;
    }

    if (!validation.valid) {
        setMessage("error", validation.message);
        hideResult();
        return validation;
    }

    setMessage("success", "Valid BITS ID detected. Click Calculate Topic to see your topic number.");
    hideResult();
    return validation;
}

function calculateTopic() {
    const bitsId = input.value.trim().toUpperCase();
    const validation = validateAndUpdate();

    if (!validation || !validation.valid) {
        return;
    }

    renderTopic(bitsId);
}

input.addEventListener("input", validateAndUpdate);

input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        calculateTopic();
    }
});

button.addEventListener("click", calculateTopic);
</script>
</body>
</html>
